name: PR 自动测试流水线
on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装测试依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: 运行自动化测试
        run: pytest test_demo.py -v
